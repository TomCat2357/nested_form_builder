<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <meta charset="utf-8">
  <style>
    body {
      font-family: 'Helvetica Neue', Arial, 'Hiragino Sans', 'Yu Gothic', sans-serif;
      padding: 16px;
      font-size: 14px;
      color: #333;
      margin: 0;
    }
    h2 {
      font-size: 15px;
      margin: 0 0 12px;
      color: #1A73E8;
    }
    label {
      display: block;
      margin-top: 12px;
      font-weight: bold;
      font-size: 13px;
    }
    select, input[type="date"] {
      width: 100%;
      padding: 6px;
      margin-top: 4px;
      box-sizing: border-box;
      font-size: 14px;
    }
    .actions {
      margin-top: 16px;
      display: flex;
      gap: 8px;
    }
    button {
      padding: 8px 16px;
      background: #1A73E8;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 14px;
    }
    button.secondary {
      background: #ddd;
      color: #333;
    }
    button:disabled {
      background: #ccc;
      cursor: not-allowed;
    }
    #status {
      margin-top: 12px;
      padding: 8px;
      border-radius: 4px;
      font-size: 13px;
      min-height: 18px;
    }
    .status-info { background: #e3f2fd; }
    .status-success { background: #e8f5e9; }
    .status-error { background: #ffebee; color: #c62828; white-space: pre-wrap; }
    .spinner {
      display: inline-block;
      width: 12px;
      height: 12px;
      border: 2px solid #ccc;
      border-top-color: #1A73E8;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      vertical-align: middle;
      margin-right: 6px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .hint {
      font-size: 12px;
      color: #666;
      margin-top: 4px;
    }
  </style>
</head>
<body>
  <h2>カレンダー → Data シート 取込</h2>

  <label for="calendar">対象カレンダー</label>
  <select id="calendar">
    <? for (var i = 0; i < calendars.length; i++) { ?>
      <option value="<?= calendars[i].id ?>"<?= calendars[i].isDefault ? ' selected' : '' ?>><?= calendars[i].name ?></option>
    <? } ?>
  </select>

  <label for="startDate">開始日</label>
  <input type="date" id="startDate" value="<?= defaultStartDate ?>">

  <label for="endDate">終了日</label>
  <input type="date" id="endDate" value="<?= defaultEndDate ?>">

  <div class="hint">件名に「講座」を含むイベントが取り込み対象です。</div>

  <div class="actions">
    <button id="runBtn" onclick="runImport()">取込実行</button>
    <button class="secondary" onclick="google.script.host.close()">閉じる</button>
  </div>

  <div id="status"></div>

  <script>
    function runImport() {
      var btn = document.getElementById("runBtn");
      var status = document.getElementById("status");
      btn.disabled = true;
      status.className = "status-info";
      status.innerHTML = '<span class="spinner"></span>取込中…';

      var startDate = document.getElementById("startDate").value;
      var endDate = document.getElementById("endDate").value;
      if (!startDate || !endDate) {
        btn.disabled = false;
        status.className = "status-error";
        status.textContent = "開始日と終了日を指定してください。";
        return;
      }
      if (endDate < startDate) {
        btn.disabled = false;
        status.className = "status-error";
        status.textContent = "終了日は開始日以降を指定してください。";
        return;
      }

      var params = {
        calendarId: document.getElementById("calendar").value,
        startDate: startDate,
        endDate: endDate
      };

      google.script.run
        .withSuccessHandler(function(result) {
          btn.disabled = false;
          if (result && result.ok) {
            status.className = "status-success";
            status.textContent =
              "完了：追加 " + result.added + " 件、上書き " + result.updated + " 件。" +
              "重複検出行 " + result.duplicateRows + " 行。";
          } else {
            status.className = "status-error";
            status.textContent = "エラー：" + (result && result.error ? result.error : "不明なエラー");
          }
        })
        .withFailureHandler(function(err) {
          btn.disabled = false;
          status.className = "status-error";
          status.textContent = "実行エラー：" + (err && err.message ? err.message : err);
        })
        .importCalendar(params);
    }
  </script>
</body>
</html>
