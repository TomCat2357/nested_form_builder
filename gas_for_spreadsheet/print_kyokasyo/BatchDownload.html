<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <meta charset="utf-8">
  <style>
    body { font-family: sans-serif; font-size: 14px; color: #333; padding: 18px 20px; max-width: 560px; margin: 0 auto; }
    h3 { margin: 0 0 12px; }
    .info { background: #f1f5fb; border-radius: 4px; padding: 8px 12px; margin: 0 0 10px; }
    .err { background: #fdecea; color: #a1160a; border-radius: 4px; padding: 10px 12px; }
    .toggle { font-size: 12px; padding: 4px 10px; margin: 0 0 8px; cursor: pointer; }
    .sheets { max-height: 320px; overflow-y: auto; border: 1px solid #ddd;
              border-radius: 4px; padding: 8px 10px; }
    .sheets label { display: block; font-weight: normal; margin: 4px 0; }
    .sheets .form { color: #888; font-size: 12px; margin-left: 4px; }
    .actions { margin-top: 16px; }
    button#run { font-size: 14px; padding: 8px 20px; background: #1a73e8; color: #fff;
                 border: none; border-radius: 4px; cursor: pointer; }
    button#run:disabled { background: #9bb8e6; cursor: default; }
    #msg { color: #666; margin-top: 12px; min-height: 18px; }
    .hint { color: #999; font-size: 12px; margin-top: 4px; }
  </style>
</head>
<body>
  <h3>許可証 一括PDFダウンロード</h3>

  <? if (errorMsg) { ?>
    <div class="err"><?= errorMsg ?></div>
  <? } else { ?>
    <div class="info">対象: <b><?= title ?></b></div>
    <button type="button" class="toggle" onclick="toggleAll()">全チェック / 全解除</button>
    <div class="sheets" id="sheets">
      <? for (var i = 0; i < sheetInfos.length; i++) { ?>
        <label>
          <input type="checkbox" class="sheetChk" value="<?= sheetInfos[i].name ?>" checked>
          <?= sheetInfos[i].name ?><span class="form">［<?= sheetInfos[i].form ?>］</span>
        </label>
      <? } ?>
    </div>
    <div class="hint">チェックした各シートを様式ごとの設定で全ページPDF化します。複数シートはZIP、1シートはPDFでダウンロードします。</div>

    <div class="actions">
      <button id="run" onclick="run()">一括ダウンロード</button>
    </div>
    <div id="msg"></div>
  <? } ?>

  <script>
    var SS_ID = <?!= JSON.stringify(ssId) ?>;

    function toggleAll() {
      var chks = document.querySelectorAll('.sheetChk');
      var anyOff = Array.prototype.some.call(chks, function (c) { return !c.checked; });
      chks.forEach(function (c) { c.checked = anyOff; });
    }

    function run() {
      var btn = document.getElementById('run');
      var targets = [];
      document.querySelectorAll('.sheetChk:checked').forEach(function (c) { targets.push(c.value); });
      if (!targets.length) { setMsg('シートを選択してください。'); return; }

      btn.disabled = true;
      setMsg('生成中… しばらくお待ちください（ページ数が多いと時間がかかります）');
      google.script.run
        .withSuccessHandler(onDone)
        .withFailureHandler(function (e) { btn.disabled = false; setMsg('エラー: ' + e.message); })
        .webGenerateBatch(SS_ID, targets);
    }

    // 印刷できたシートのチェックを外す（失敗・空はチェックを残す）。
    function syncCheckboxes(res) {
      if (!res || !res.succeeded || !res.succeeded.length) return;
      var done = {};
      res.succeeded.forEach(function (n) { done[n] = true; });
      document.querySelectorAll('.sheetChk').forEach(function (c) {
        if (done[c.value]) c.checked = false;
      });
    }

    function failureMsg(res) {
      if (!res) return '';
      var parts = [];
      if (res.failed && res.failed.length) parts.push('ダウンロード失敗: ' + res.failed.join(', '));
      if (res.empty && res.empty.length) parts.push('空のため未出力: ' + res.empty.join(', '));
      return parts.join(' ／ ');
    }

    function onDone(res) {
      var btn = document.getElementById('run');
      syncCheckboxes(res);
      btn.disabled = false;
      if (!res || !res.ok) { setMsg('エラー: ' + (res ? res.error : '不明')); return; }

      var fail = failureMsg(res);
      var extra = fail ? '（' + fail + '）' : (res.note ? '（' + res.note + '）' : '');

      // ダウンロード: Blob を生成して保存
      var bin = atob(res.b64), len = bin.length, bytes = new Uint8Array(len);
      for (var i = 0; i < len; i++) bytes[i] = bin.charCodeAt(i);
      var url = URL.createObjectURL(new Blob([bytes], { type: res.mime }));
      var a = document.createElement('a');
      a.href = url; a.download = res.name;
      document.body.appendChild(a); a.click();
      setMsg('ダウンロードしました（' + res.name + '）。' + extra + ' 続けて出力できます。');
      setTimeout(function () { URL.revokeObjectURL(url); document.body.removeChild(a); }, 1200);
    }

    function setMsg(t) { var m = document.getElementById('msg'); if (m) m.textContent = t; }
  </script>
</body>
</html>
